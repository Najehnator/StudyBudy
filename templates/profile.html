<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Redigera profil</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>StudyBuddy</h1>
        <nav>
            <a href="{{ url_for('show_dashboard_page') }}">Dashboard</a>
            <a href="{{ url_for('logout_user') }}">Logga ut</a>
        </nav>
    </header>

    <main>
        <section class="card">
            <h2>Redigera profil</h2>

            <form method="POST" enctype="multipart/form-data">
                <label for="display_name">Namn</label>
                <input type="text" id="display_name" name="display_name" value="{{ profile[2] }}" required>

                <label for="campus">Campus</label>
                <input type="text" id="campus" name="campus" value="{{ profile[3] or '' }}">

                <label for="subject">Ämne / kurs</label>
                <input type="text" id="subject" name="subject" value="{{ profile[4] or '' }}">

                <label for="study_type">Studietyp</label>
                <input type="text" id="study_type" name="study_type" value="{{ profile[5] or '' }}">

                <label for="availability">Tillgänglighet</label>
                <textarea id="availability" name="availability">{{ profile[6] or '' }}</textarea>

                <label for="competencies">Kompetenser</label>
                <textarea id="competencies" name="competencies">{{ profile[7] or '' }}</textarea>

                <label for="needs">Behöver hjälp med</label>
                <textarea id="needs" name="needs">{{ profile[8] or '' }}</textarea>

                <label for="bio">Bio</label>
                <textarea id="bio" name="bio">{{ profile[9] or '' }}</textarea>

                <label for="profile_image">Profilbild</label>
                <input type="file" id="profile_image" name="profile_image">

                <button type="submit">Spara ändringar</button>
            </form>
        </section>
    </main>
</body>
</html>
